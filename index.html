<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="./js/script.js" defer></script>
    <title>Tá Chovendo aí?</title>
  </head>
  <body>
    <div id="container">
      <!-- Search City -->
      <form id="search">
        <i class="fa-solid fa-location-dot"></i>
        <input
          type="search"
          name="city_name"
          id="city_name"
          placeholder="Digite a cidade..."
        />
        <button type="submit">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </form>
      <!-- Weather Data -->
      <div id="weather" class="show">
        <h1 id="title">Joinville, SC</h1>
        <div id="infos">
          <div id="temp">
            <img
              src="https://openweathermap.org/payload/api/media/file/10d%402x.png"
              alt="icon_temp"
              id="temp_img"
            />
            <div class="info_data">
              <p id="temp_value" max=2>32<sup>℃</sup></p>
              <p id="temp_description">nublado</p>
            </div>
          </div>
        </div>
        <div id="other_infos">
          <div class="info">
            <i id="temp_max_ico" class="fa-solid fa-temperature-arrow-up"></i>
            <div class="info_data">
              <h2>Temp.max</h2>
              <p id="temp_max">32<sup>ºC</sup></p>
            </div>
          </div>
          <div class="info">
            <i id="temp_min_ico" class="fa-solid fa-temperature-arrow-down"></i>
            <div class="info_data">
              <h2>Temp.min</h2>
              <p id="temp_min">28<sup>ºC</sup></p>
            </div>
          </div>
          <div class="info">
            <i id="humidity_ico" class="fa-solid fa-droplet"></i>
            <div class="info_data">
              <h2>Umidade</h2>
              <p id="humidity">80%</p>
            </div>
          </div>
          <div class="info">
            <i id="wind_ico" class="fa-solid fa-wind"></i>
            <div class="info_data">
              <h2>Vento</h2>
              <p id="wind">40km/h</p>
            </div>
          </div>
        </div>
      </div>
      <p id="alert"></p>
    </div>
  </body>
</html>
